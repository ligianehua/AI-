<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智服小助 · AI售后客服</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="/static/vendor/vue.global.prod.js"
          onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/vue@3/dist/vue.global.prod.js';document.head.appendChild(s)"></script>
</head>
<body>
<div id="app" v-cloak>
  <!-- 登录遮罩 -->
  <div v-if="!me" class="modal-mask" style="background:#f5f7fa">
    <div class="modal" style="width:400px;text-align:center">
      <div style="font-size:40px;margin-bottom:8px">🤖</div>
      <h3 style="margin-bottom:4px">智服小助 · AI售后客服</h3>
      <p style="font-size:13px;color:#6b7280;margin-bottom:18px">请输入手机号登录，新用户将自动注册</p>
      <div class="form-row" style="text-align:left"><label>手机号</label>
        <input v-model="loginPhone" placeholder="如 13800000001" @keydown.enter="login"></div>
      <div class="form-row" style="text-align:left"><label>姓名（新用户注册时填写）</label>
        <input v-model="loginName" placeholder="选填" @keydown.enter="login"></div>
      <button class="btn primary" style="width:100%;padding:10px" @click="login">登录 / 注册</button>
      <div v-if="loginError" style="color:#dc2626;font-size:13px;margin-top:10px">{{ loginError }}</div>
      <div v-if="demoCustomers.length" style="margin-top:16px;text-align:left">
        <div style="font-size:12px;color:#9ca3af;margin-bottom:6px">演示账号（点击填入）：</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          <button v-for="c in demoCustomers" :key="c.phone" class="chip"
                  @click="loginPhone = c.phone">{{ c.name }} {{ c.phone.slice(-4) }}</button>
        </div>
      </div>
    </div>
  </div>

  <template v-if="me">
  <!-- 顶栏 -->
  <div class="topbar">
    <div class="logo">🤖 智服小助 <span style="font-size:12px;color:#9ca3af;font-weight:400">AI售后客服</span></div>
    <span class="mode-badge" :class="{real: !mode.mock}">{{ mode.mock ? '演示模式' : '真实API · ' + mode.model }}</span>
    <div class="spacer"></div>
    <!-- 通知铃铛 -->
    <div style="position:relative">
      <button class="btn sm" @click="showNotify = !showNotify">
        🔔 通知<span v-if="notifyUnread" style="background:#dc2626;color:#fff;border-radius:999px;padding:0 6px;font-size:11px;margin-left:4px">{{ notifyUnread }}</span>
      </button>
      <div v-if="showNotify" style="position:absolute;right:0;top:38px;width:360px;max-height:420px;overflow-y:auto;background:#fff;border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.12);z-index:60;padding:10px">
        <div v-if="!notifications.length" class="empty" style="padding:20px">暂无通知</div>
        <div v-for="n in notifications" :key="n.id"
             style="padding:10px;border-radius:8px;margin-bottom:6px"
             :style="{background: n.status === 'pending' ? '#eff6ff' : '#fafafa'}">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="tag" :class="{orange: n.type === 'warranty_expiry', blue: n.type === 'rma_update', green: n.type === 'maintenance'}">{{ n.type_name }}</span>
            <strong style="font-size:13px;flex:1">{{ n.title }}</strong>
          </div>
          <div style="font-size:12px;color:#6b7280;margin:6px 0;line-height:1.6">{{ n.content }}</div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:11px;color:#c0c6cf">{{ n.created_at }}</span>
            <button v-if="n.status === 'pending'" class="btn sm" @click="readNotify(n)">知道了</button>
          </div>
        </div>
      </div>
    </div>
    <span style="font-size:13px;color:#374151">{{ me.name }}（{{ me.level }}）</span>
    <button class="btn sm" @click="logout">退出</button>
  </div>

  <div class="chat-layout">
    <!-- 会话列表 -->
    <div class="chat-side">
      <div class="side-head">
        <button class="btn primary" style="width:100%" @click="newConversation">＋ 新会话</button>
      </div>
      <div class="conv-list">
        <div v-for="c in conversations" :key="c.id" class="conv-item"
             :class="{active: conv && conv.id === c.id}" @click="openConversation(c)">
          <div class="conv-title">{{ c.title }}</div>
          <div class="conv-meta">{{ c.created_at }} ·
            {{ c.status === 'closed' ? '已结束' : (c.mode === 'human' ? '人工服务中' : '进行中') }}</div>
        </div>
        <div v-if="!conversations.length" class="empty">暂无会话</div>
      </div>
    </div>

    <!-- 聊天主区 -->
    <div class="chat-main">
      <div v-if="conv && conv.mode === 'human'"
           style="background:#fff7ed;border-bottom:1px solid #fed7aa;padding:8px 16px;font-size:13px;color:#9a3412;text-align:center">
        👩‍💼 人工客服{{ conv.assigned_agent ? '（' + conv.assigned_agent + '）' : '' }}正在为您服务
      </div>
      <div class="msg-list" ref="msgList">
        <div v-if="!conv" class="empty" style="padding-top:120px">
          <div style="font-size:44px;margin-bottom:12px">👋</div>
          <div style="font-size:16px;color:#374151;margin-bottom:6px">您好，{{ me.name }}</div>
          <div>点击左上角「新会话」开始咨询：订单查询 / 故障排查 / 退换货 / 保修维修</div>
        </div>

        <template v-else>
          <template v-for="m in messages" :key="m.key">
            <div v-if="m.role === 'notice'" style="text-align:center;margin:14px 0">
              <span style="font-size:12px;color:#9ca3af;background:#f3f4f6;border-radius:999px;padding:4px 14px">{{ m.text }}</span>
            </div>
            <div v-else class="msg-row" :class="m.role">
              <div class="avatar">{{ m.role === 'user' ? '🙂' : (m.agent_name ? '👩‍💼' : '🤖') }}</div>
              <div style="max-width:78%">
                <div v-if="m.agent_name" style="font-size:11px;color:#9a3412;margin-bottom:2px">人工客服 · {{ m.agent_name }}</div>
                <div v-if="m.tool_calls && m.tool_calls.length" class="tool-badges">
                  <span v-for="(t, i) in m.tool_calls" :key="i" class="tool-badge"
                        :class="{ok: t.ok === true, err: t.ok === false}">
                    <span class="dot"></span>
                    <span>{{ t.running ? '正在' + t.label + '…' : t.label }}</span>
                    <span v-if="t.summary" class="summary">{{ t.summary }}</span>
                  </span>
                </div>
                <img v-if="m.image" :src="m.image"
                     style="max-width:220px;max-height:220px;border-radius:10px;border:1px solid #e5e7eb;margin-bottom:6px;display:block;cursor:zoom-in"
                     onclick="window.open(this.src)">
                <div class="bubble" v-if="m.text || m.streaming">
                  <span v-html="renderText(m.text)"></span><span v-if="m.streaming" class="cursor"></span>
                </div>
                <div v-if="m.role === 'assistant' && !m.agent_name && m.id && !m.streaming"
                     style="margin-top:4px;display:flex;gap:6px">
                  <button class="chip" style="padding:2px 10px"
                          :style="m.feedback === 'up' ? 'background:#f0fdf4;border-color:#86efac;color:#16a34a' : ''"
                          @click="sendFeedback(m, 'up')">👍 有帮助</button>
                  <button class="chip" style="padding:2px 10px"
                          :style="m.feedback === 'down' ? 'background:#fef2f2;border-color:#fecaca;color:#dc2626' : ''"
                          @click="sendFeedback(m, 'down')">👎 没解决</button>
                </div>
                <div v-for="(card, i) in (m.cards || [])" :key="'c'+i" class="biz-card">
                  <div>{{ card.kind === 'rma' ? '📦 退换货申请' : '🎫 售后工单' }}
                    <span class="tag blue" style="margin-left:6px">{{ card.status }}</span></div>
                  <div style="margin-top:4px">单号：<span class="no">{{ card.no }}</span></div>
                  <div style="color:#6b7280;margin-top:2px">{{ card.title }}</div>
                </div>
                <div style="font-size:11px;color:#c0c6cf;margin-top:4px">{{ m.time }}</div>
              </div>
            </div>
          </template>
        </template>
      </div>

      <div class="chat-input-area" v-if="conv">
        <div class="chips" v-if="conv.status !== 'closed'">
          <button class="chip" v-for="q in quickChips" @click="send(q)">{{ q }}</button>
          <button class="chip" style="color:#ea580c;border-color:#fed7aa" @click="showRating = true">结束会话并评价</button>
        </div>
        <div v-if="conv.status === 'closed'" class="empty" style="padding:12px">
          本会话已结束，如需继续咨询请新建会话
        </div>
        <div v-if="attachImage" style="margin-bottom:8px;display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:6px 10px">
          <img :src="attachImage" style="height:44px;border-radius:6px">
          <span style="font-size:12px;color:#6b7280">已附加照片</span>
          <button class="btn sm danger" @click="attachImage = null">✕</button>
        </div>
        <div class="input-box" v-if="conv.status !== 'closed'">
          <input type="file" ref="imgFile" accept="image/jpeg,image/png,image/webp"
                 style="display:none" @change="pickImage">
          <button class="btn" style="border:none;font-size:18px;padding:6px 8px"
                  title="上传故障照片" @click="$refs.imgFile.click()">📷</button>
          <textarea v-model="draft" rows="1"
                    :placeholder="conv.mode === 'human' ? '人工客服服务中，直接输入消息…' : '请输入您的问题…（可点📷上传故障照片）'"
                    @keydown.enter.exact.prevent="send()" :disabled="sending"></textarea>
          <button class="btn primary" @click="send()" :disabled="sending || (!draft.trim() && !attachImage)">
            {{ sending ? '发送中…' : '发送' }}</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 满意度弹窗 -->
  <div v-if="showRating" class="modal-mask" @click.self="showRating = false">
    <div class="modal" style="width:400px;text-align:center">
      <h3>本次服务您还满意吗？</h3>
      <div class="stars">
        <span v-for="i in 5" :key="i" class="star" :class="{on: i <= ratingScore}"
              @click="ratingScore = i">★</span>
      </div>
      <div style="color:#6b7280;font-size:13px;margin-bottom:10px">
        {{ ['很不满意','不满意','一般','满意','非常满意'][ratingScore - 1] || '请点击星星评分' }}
      </div>
      <div class="form-row">
        <textarea v-model="ratingComment" placeholder="补充评价（选填）" style="min-height:60px"></textarea>
      </div>
      <div class="modal-actions" style="justify-content:center">
        <button class="btn" @click="closeWithoutRating">跳过并结束</button>
        <button class="btn primary" :disabled="!ratingScore" @click="submitRating">提交评价</button>
      </div>
    </div>
  </div>
  </template>

  <div v-if="toast" class="toast">{{ toast }}</div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/chat.js"></script>
</body>
</html>
