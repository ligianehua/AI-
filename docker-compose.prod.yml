# 生产部署：docker compose -f docker-compose.prod.yml up -d --build
# 迁移由一次性 migrate 服务自动执行；初始管理员见 README「生产初始化」。
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ai_sales
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_sales"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes  # 持久化：重启不丢待执行任务
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/ai_sales
    command: uv run alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/ai_sales
      REDIS_URL: redis://redis:6379/0
      TASK_MODE: arq
      APP_ENV: prod
    volumes:
      - uploads:/app/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    # 镜像默认 CMD：uvicorn 无 --reload；多核可改 command 加 --workers N

  worker:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/ai_sales
      REDIS_URL: redis://redis:6379/0
      TASK_MODE: arq
    volumes:
      - uploads:/app/data/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: uv run arq app.tasks.worker.WorkerSettings
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # 浏览器访问后端的地址（与 .env.example 同名变量，构建期内联）
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_AFTERSALES_URL: ${NEXT_PUBLIC_AFTERSALES_URL:-http://localhost:8100}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # M15 售后中心：独立子系统（SQLite + 自带前端），走 OpenAI 兼容接口复用 silra 网关
  aftersales:
    build: ./aftersales
    environment:
      OPENAI_API_KEY: ${AFTERSALES_API_KEY:-}
      OPENAI_BASE_URL: https://api.silra.cn/v1
      MODEL: qwen3-max
      MOCK_MODE: auto
      CHANNEL_API_KEY: ${AFTERSALES_CHANNEL_KEY:-}
      AUTO_ANALYZE_HOURS: "6"
    volumes:
      - aftersales-data:/app/data
    ports:
      - "8100:8000"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
  aftersales-data:
